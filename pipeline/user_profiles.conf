########################################
# User profiles for spike sorting paths
#
# Each profile needs one base-path line:
#   <profile>=<absolute base path>
#
# Optionally, override any preprocessing knob with:
#   <profile>.<KNOB>=<value>
#
# Available knobs (defaults shown):
#   DENOISING_METHOD    = destripe   (options: destripe | cmr)
#   REMOVE_BAD_CHANNELS = false      (options: true | false)
#   BANDPASS_FILTER     = true       (options: true | false)
#   BANDPASS_FREQ_MIN   = 300        (Hz)
#   BANDPASS_FREQ_MAX   = 10000      (Hz)
#
# To run:
#   pipeline/shun_spikesort_pipeline.sh pipeline/spike_sort.slrm <profile>
########################################

shunnnli=/n/netscratch/bsabatini_lab/Lab/shunnnli/spikesorting

# Emily: same knobs as default except a narrower bandpass (300-6000 Hz)
emily=/n/netscratch/bsabatini_lab/Lab/eferenczi/spikesorting
emily.BANDPASS_FREQ_MAX=6000

# Emily without bandpass filter
emily_noband=/n/netscratch/bsabatini_lab/Lab/eferenczi/spikesorting
emily_noband.BANDPASS_FILTER=false
